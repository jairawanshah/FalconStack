name: FalconStack Validation


on:
  push:


jobs:
  validate:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Check Dockerfile
        run: |
          test -f Dockerfile


      - name: Check Scripts Directory
        run: |
          test -d scripts


      - name: Check Monitoring Directory
        run: |
          test -d monitoring


      - name: Show Repository Structure
        run: |
          find .


      - name: Validation Passed
        run: echo "FalconStack validation successful"
